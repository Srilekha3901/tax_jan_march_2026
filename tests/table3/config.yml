source:
  path: "/Users/admin/PycharmProjects/taf_jan_march_2026/input_files/customer_source.csv"
  type: "csv"
  file_config:
    schema: "N"
    header: True
    sep: ","
    inferSchema: True
target:
  type: "database"
  transformation : ["N","NA"]
  table: "[dbo].[customer_t]"
  env: "qa"
  exclude_cols: ['create_date','update_date','batch_date','create_user']
validation:
  key_columns: ['customer_id']
  primary_keys: ['customer_id']
  unique_cols: ['customer_id', 'email']
  not_null_cols: ['customer_id', 'name']
  regex_pattern_col: ['name','[a-zA-Z]']
  range_col: ['customer_id', 10,100]