# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: ETL Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Show Repository Structure
        run: |
          pwd
          ls -la
          find . -maxdepth 2 -type f

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip list

      - name: Verify dotenv Installation
        run: |
          python -c "from dotenv import load_dotenv; print('python-dotenv installed successfully')"

      - name: Create Report Folder
        run: mkdir -p reports

      - name: Run Pytest
        run: |
          pytest -v -s --junitxml=reports/pytest-report.xml

      - name: Upload Pytest Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: reports/pytest-report.xml
